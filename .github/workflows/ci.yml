name: NEXUS CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════
  # Python Jobs
  # ═══════════════════════════════════════

  lint-python:
    name: "🐍 Lint Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check services/causal-engine/app/
      - run: ruff check services/interceptor/app/
      - run: ruff check services/prediction-engine/app/
      - run: ruff check services/remediation/app/
      - run: ruff check services/regulatory-intelligence/app/
      - run: ruff check services/federated-aggregator/app/

  typecheck-python:
    name: "🐍 Typecheck Python"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mypy pydantic numpy pandas scipy
      - run: pip install -e ./shared/python
      - run: mypy services/causal-engine/app/ --ignore-missing-imports
      - run: mypy services/interceptor/app/ --ignore-missing-imports

  test-python:
    name: "🧪 Test Python Services"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - causal-engine
          - interceptor
          - federated-aggregator
          - prediction-engine
          - remediation
          - regulatory-intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ./shared/python
          pip install -e ./sdk/python
          if [ -f services/${{ matrix.service }}/requirements.txt ]; then
            pip install -r services/${{ matrix.service }}/requirements.txt
          fi
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          PYTHONPATH: "../../sdk/python:../../shared/python:."
        run: |
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml || true

  test-sdk:
    name: "🧪 Test Python SDK"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install -e ./shared/python
          pip install -e ./sdk/python
          pip install pytest pytest-asyncio
      - run: python -m pytest sdk/python/tests/ -v --tb=short

  # ═══════════════════════════════════════
  # Node.js Jobs
  # ═══════════════════════════════════════

  test-node:
    name: "🧪 Test Node.js Services"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, vault]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npx jest --coverage --passWithNoTests

  lint-ts:
    name: "📝 Lint TypeScript"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, vault]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: services/${{ matrix.service }}
        run: npm ci
      - working-directory: services/${{ matrix.service }}
        run: npx eslint src/ --ext .ts || true

  typecheck-ts:
    name: "🔍 Typecheck TypeScript"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, vault]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: services/${{ matrix.service }}
        run: npm ci
      - working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit || true

  # ═══════════════════════════════════════
  # Web App Build
  # ═══════════════════════════════════════

  build-web:
    name: "🌐 Build Web Dashboard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        run: npm run build

  # ═══════════════════════════════════════
  # Integration Smoke Test
  # ═══════════════════════════════════════

  integration-smoke:
    name: "🔥 Integration Smoke Test"
    runs-on: ubuntu-latest
    needs: [test-python, test-node, test-sdk]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install test deps
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -e ./shared/python
          pip install -e ./sdk/python
      - name: Run integration tests (mock mode)
        env:
          NEXUS_GATEWAY_URL: "http://localhost:8080"
          NEXUS_TEST_MODE: "mock"
        run: python -m pytest tests/integration/ -v --tb=short -k "mock" || true
